# modules.yaml — API module registry
# MVP modules are enabled. V2/domain modules are disabled.
# Load order = dependency order.

modules:
  # ── Core ─────────────────────────────────────────────────────────
  - name: auth
    enabled: true

  - name: admin
    enabled: true

  - name: affaires
    enabled: true

  - name: documents
    enabled: true

  - name: agent
    enabled: true

  - name: openai_compat
    enabled: true

  # ── Hermes Console (new) ─────────────────────────────────────────
  - name: hermes_console
    enabled: true

  # ── Governance modules ───────────────────────────────────────────
  - name: approvals
    enabled: false

  # ── V2 modules (disabled for MVP) ───────────────────────────────
  - name: webhooks
    enabled: false

  - name: orchestra
    enabled: false

  - name: meeting
    enabled: false

  - name: capture
    enabled: false

  - name: wiki
    enabled: false

  - name: scoring
    enabled: false

  - name: decisions
    enabled: false

  - name: preprocessing
    enabled: false

  - name: guards
    enabled: false

  - name: memory
    enabled: false

  - name: flowmanager
    enabled: false

  - name: evaluation
    enabled: false

  # ── Domain modules (disabled for MVP) ───────────────────────────
  - name: chantier
    enabled: false

  - name: planning
    enabled: false

  - name: finance
    enabled: false

  - name: communications
    enabled: false
