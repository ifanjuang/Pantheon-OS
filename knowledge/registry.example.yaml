# Pantheon Next Knowledge Registry example
#
# Purpose:
#   Map OpenWebUI Knowledge Bases to Pantheon domains, source tiers,
#   privacy constraints and Evidence Pack requirements.
#
# Doctrine:
#   Knowledge is source material.
#   Memory requires candidate -> Evidence Pack -> validation.
#   OpenWebUI Knowledge is not Pantheon Memory.
#   Hermes may query Knowledge only under Task Contract.
#
# This file is an example only.
# Do not put real client, project, address, person or private data here.

version: 1
status: example
updated_at: "2026-05-02"
owner: pantheon-governance

rules:
  default_status: planned
  default_source_tier: T5
  default_reliability_level: R0
  default_privacy_level: internal
  default_project_scope: none
  unknown_sources: blocked_until_reviewed
  cross_project_use: forbidden_without_explicit_trace
  memory_promotion: candidate_only
  memory_promotion_requires:
    - evidence_pack
    - approval_C3_minimum
    - source_trace
    - conflict_check
  forbidden:
    - treating_knowledge_as_canonical_memory
    - using_private_project_data_in_generic_collections
    - mixing_project_collections_without_trace
    - promoting_openwebui_history_to_memory_directly
    - using_stale_regulatory_sources_without_warning

source_tiers:
  T0:
    label: pantheon_source_of_truth
    description: Pantheon governance Markdown or validated Pantheon memory.
    evidence_weight: canonical
  T1:
    label: signed_or_official_project_documents
    description: Signed contracts, official project documents or validated project references.
    evidence_weight: project_specific_high
  T2:
    label: working_project_documents
    description: Drafts, working documents, quotes, reports or extracts that must be checked for version and status.
    evidence_weight: project_specific_conditional
  T3:
    label: generic_official_references
    description: Public regulatory or official professional references.
    evidence_weight: reference_high_if_current
  T4:
    label: templates_and_examples
    description: Internal or external models used as drafting aids only.
    evidence_weight: drafting_aid
  T5:
    label: external_unverified_sources
    description: Unverified external references or exploratory material.
    evidence_weight: inspiration_only

reliability_levels:
  R0: draft_or_unknown
  R1: useful_example_not_validated
  R2: validated_internal_model
  R3: official_or_normative_reference
  R4: validated_pantheon_rule
  R5: pantheon_source_of_truth

privacy_levels:
  public:
    allowed_in_repo_examples: true
    description: Public and non-sensitive material.
  internal:
    allowed_in_repo_examples: true
    description: Internal methods, governance and non-client examples.
  private:
    allowed_in_repo_examples: false
    description: Project, client, contract, quote, site or correspondence data.
  sensitive:
    allowed_in_repo_examples: false
    description: Secrets, credentials, personal data, legal exposure or high-risk confidential data.

freshness_policies:
  static:
    description: Stable source; review when governance changes.
    check_required_after_days: null
  periodic_6_months:
    description: Review every six months.
    check_required_after_days: 180
  periodic_12_months:
    description: Review yearly.
    check_required_after_days: 365
  regulatory_current:
    description: Must be checked before consequential regulatory, contractual or compliance use.
    check_required_after_days: 90
  project_versioned:
    description: Must verify document date, version, status and superseded state before use.
    check_required_after_days: null

collections:
  - id: pantheon_governance
    label: Pantheon governance
    domain: general
    status: active
    openwebui_knowledge_base: pantheon_governance
    source_tier: T0
    reliability_level: R5
    privacy_level: internal
    project_scope: none
    freshness_policy: static
    allowed_use:
      - answer_governance_questions
      - build_context_packs
      - check_task_contracts
      - check_approvals
      - check_evidence_policy
    forbidden_use:
      - override_governance_markdown
      - promote_memory_without_C3_review
      - execute_tools_directly
    evidence_required: true
    memory_candidate_allowed: false
    notes: Governance Markdown is source of truth; this Knowledge Base may mirror it but does not replace it.

