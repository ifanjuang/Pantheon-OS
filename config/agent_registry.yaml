# Pantheon OS — Registre des agents
#
# Source unique de vérité pour l'identité et les responsabilités des agents.
#
# Champs :
#   role      — identifiant fonctionnel stable (snake_case)
#   layer     — couche architecturale (perception | analysis | framing | continuity | communication | production | meta)
#   class     — nom de classe Python cible (convention MythRole)
#   triggers  — criticités activant cet agent automatiquement ([] = jamais auto)
#   veto      — l'agent peut-il émettre un veto bloquant ?
#   old_names — anciens noms internes (rétrocompat, migration)
#
# Convention événements SSE : {agent_lowercase}.{event_name}
# Convention logs            : {agent_lowercase}.{action}
# Convention JSON            : {"agent": "ZEUS", "role": "orchestrator"}

# ── Meta-agents ──────────────────────────────────────────────────────────────

ZEUS:
  role: orchestrator
  layer: meta
  class: ZeusOrchestrator
  soul_dir: core
  triggers: [C3, C4, C5]
  veto: false
  old_names: [zeus, orchestrator, agent_manager]

