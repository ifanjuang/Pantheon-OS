# Pantheon Next model routing example
#
# This file is an example policy configuration.
# It does not make Pantheon a model router.
# OpenWebUI exposes available providers and presets.
# Hermes executes model calls while respecting this policy.
# Ollama nodes serve models.

version: 0.2.0
status: example_only
mode: multi_compute_node

# Supported modes:
# - single_ollama_instance
# - multi_ollama_instance
# - multi_compute_node

references:
  policy: docs/governance/MODEL_ROUTING_POLICY.md
  compute_nodes: config/compute_nodes.example.yaml
  local_compute_nodes: config/compute_nodes.local.yaml
  local_model_routing: config/model_routing.local.yaml

rules:
  pantheon_is_not_model_router: true
  hermes_applies_runtime_selection: true
  no_silent_fallback_for_C4_C5: true
  no_private_data_to_remote_nodes_without_policy: true
  local_files_should_not_be_committed: true

model_registry:
  qwen25_7b_general:
    provider: ollama
    compute_node_id: pc00
    model: qwen2.5:7b
    type: chat
    context_length: 32768
    capabilities:
      - general
      - extraction
      - summarization
      - low_latency
      - local_only
      - private_data_allowed

  qwen25_14b_strong:
    provider: ollama
    compute_node_id: pc01
    model: qwen2.5:14b
    type: chat
    context_length: 65536
    capabilities:
      - reasoning
      - planning
      - validation
      - contradiction_check
      - structured_output
      - local_only
      - private_data_allowed

  qwen25_coder_7b:
    provider: ollama
    compute_node_id: pc02
    model: qwen2.5-coder:7b
    type: chat
    context_length: 32768
    capabilities:
      - coding
      - technical_review
      - repo_audit
      - local_only
      - private_data_allowed

  mistral_7b_communication:
    provider: ollama
    compute_node_id: pc00
    model: mistral:7b
    type: chat
    context_length: 32768
    capabilities:
      - style_control
      - summarization
      - low_latency
      - local_only
      - private_data_allowed

  nomic_embed:
    provider: ollama
    compute_node_id: pc00
    model: nomic-embed-text
    type: embedding
    embedding_dim: 768
    capabilities:
      - embedding
      - local_only
      - private_data_allowed

fallback_defaults:
  C0: use_fallback_with_warning
  C1: use_fallback_with_warning
  C2: use_fallback_with_warning
  C3: degrade_to_draft_only
  C4: stop_and_request_manual_review
  C5: block

roles:
  default:
    model_id: qwen25_7b_general
    fallback_model_ids:
      - qwen25_14b_strong
    if_unavailable: use_fallback_with_warning
    max_criticality_without_manual_review: C2

  ATHENA:
    role: planning
    openwebui_preset_name: ATHENA Planner
    model_id: qwen25_14b_strong
    fallback_model_ids:
      - qwen25_7b_general
    required_capabilities:
      - reasoning
      - planning
      - structured_output
    if_unavailable: degrade_to_draft_only
    max_criticality_without_manual_review: C3

  ARGOS:
    role: extraction
    openwebui_preset_name: ARGOS Extractor
    model_id: qwen25_7b_general
    fallback_model_ids:
      - qwen25_14b_strong
    required_capabilities:
      - extraction
      - source_discipline
      - low_latency
    if_unavailable: use_fallback_with_warning
    max_criticality_without_manual_review: C3

  THEMIS:
    role: risk_policy
    openwebui_preset_name: THEMIS Risk Check
    model_id: qwen25_14b_strong
    fallback_model_ids: []
    required_capabilities:
      - reasoning
      - policy_review
      - contradiction_check
    if_unavailable: stop_and_request_manual_review
    max_criticality_without_manual_review: C3

  APOLLO:
    role: validation
    openwebui_preset_name: APOLLO Validator
    model_id: qwen25_14b_strong
    fallback_model_ids: []
    required_capabilities:
      - validation
      - contradiction_check
      - source_discipline
    if_unavailable: stop_and_request_manual_review
    max_criticality_without_manual_review: C3

  IRIS:
    role: communication
    openwebui_preset_name: IRIS Communication
    model_id: mistral_7b_communication
    fallback_model_ids:
      - qwen25_7b_general
    required_capabilities:
      - style_control
      - summarization
    if_unavailable: use_fallback_with_warning
    max_criticality_without_manual_review: C3

  HESTIA:
    role: project_memory_context
    openwebui_preset_name: HESTIA Project Memory
    model_id: qwen25_7b_general
    fallback_model_ids:
      - qwen25_14b_strong
    required_capabilities:
      - extraction
      - source_discipline
      - structured_output
    if_unavailable: degrade_to_diagnostic_only
    max_criticality_without_manual_review: C3

  MNEMOSYNE:
    role: system_memory_patterns
    openwebui_preset_name: MNEMOSYNE System Memory
    model_id: qwen25_14b_strong
    fallback_model_ids: []
    required_capabilities:
      - reasoning
      - structured_output
      - validation
    if_unavailable: stop_and_request_manual_review
    max_criticality_without_manual_review: C3

  HEPHAESTUS:
    role: technical_review
    openwebui_preset_name: HEPHAESTUS Technical Review
    model_id: qwen25_coder_7b
    fallback_model_ids:
      - qwen25_14b_strong
    required_capabilities:
      - reasoning
      - coding
      - contradiction_check
    if_unavailable: use_fallback_with_warning
    max_criticality_without_manual_review: C3

  PROMETHEUS:
    role: adversarial_challenge
    openwebui_preset_name: PROMETHEUS Challenge
    model_id: qwen25_14b_strong
    fallback_model_ids: []
    required_capabilities:
      - contradiction_check
      - reasoning
    if_unavailable: stop_and_request_manual_review
    max_criticality_without_manual_review: C3

  ZEUS:
    role: arbitration
    openwebui_preset_name: ZEUS Arbitration
    model_id: qwen25_14b_strong
    fallback_model_ids: []
    required_capabilities:
      - reasoning
      - planning
      - validation
    if_unavailable: stop_and_request_manual_review
    max_criticality_without_manual_review: C3

criticality_rules:
  C0:
    allowed_fallback: true
    evidence_required: false
  C1:
    allowed_fallback: true
    evidence_required: false
  C2:
    allowed_fallback: true
    evidence_required: true
  C3:
    allowed_fallback: conditional
    evidence_required: true
    fallback_limit: draft_or_candidate_only
  C4:
    allowed_fallback: false
    evidence_required: true
    manual_review_required: true
  C5:
    allowed_fallback: false
    evidence_required: true
    manual_review_required: true
    default_behavior: block

evidence_trace_fields:
  - requested_agent
  - preferred_model
  - actual_model
  - model_id
  - compute_node_id
  - instance_id
  - fallback_used
  - fallback_reason
  - criticality
  - output_limitations
  - manual_review_required
