# config/agents.yaml — Agent registry
# name: display identifier used at runtime and in the Console UI
#   @AGENT  = major meta agent (orchestration authority)
#   @Agent  = operational agent (analysis, memory, output, system)
# enabled: true|false controls whether the agent is loaded at startup

agents:
  # ── Meta layer (@AGENT — major orchestration authority) ───────────
  ZEUS:
    name: "@ZEUS"
    layer: meta
    role: orchestrator
    class: runtime.hermes.agents.meta.Zeus
    enabled: true
    description: "Global orchestration — execution order, merge/fork/child workflows, fallbacks"

  ATHENA:
    name: "@ATHENA"
    layer: meta
    role: planner
    class: runtime.hermes.agents.meta.Athena
    enabled: true
    description: "Planning and decomposition — task analysis, sub-task breakdown, agent selection"

  THEMIS:
    name: "@THEMIS"
    layer: meta
    role: process_guardian
    class: runtime.hermes.agents.meta.Themis
    enabled: false
    veto: true
    description: "Process integrity — workflow rule enforcement, output conformance checks"

  HERA:
    name: "@HERA"
    layer: meta
    role: supervisor
    class: runtime.hermes.agents.meta.Hera
    enabled: false
    description: "Global coherence — final alignment check, contradiction detection"

  APOLLO:
    name: "@APOLLO"
    layer: meta
    role: validator
    class: runtime.hermes.agents.meta.Apollo
    enabled: true
    description: "Final validation — reliability scoring, confidence score, release decision"

  # ── Analysis layer (@Agent — operational research agents) ─────────
  HERMES:
    name: "@Hermes"
    layer: analysis
    role: router
    class: runtime.hermes.agents.analysis.Hermes
    enabled: true
    description: "Research router — source selection, skill activation, multi-source coordination"

  DEMETER:
    name: "@Demeter"
    layer: analysis
    role: collector
    class: runtime.hermes.agents.analysis.Demeter
    enabled: false
    description: "Collection and ingestion — PDF/file/web fetch, corpus preparation, normalization"

  ARGOS:
    name: "@Argos"
    layer: analysis
    role: extractor
    class: runtime.hermes.agents.analysis.Argos
    enabled: true
    description: "Factual extraction — facts, figures, citations, verifiable evidence"

  PROMETHEUS:
    name: "@Prometheus"
    layer: analysis
    role: challenger
    class: runtime.hermes.agents.analysis.Prometheus
    enabled: true
    description: "Contradiction and cross-referencing — source comparison, inconsistency detection"

  ARTEMIS:
    name: "@Artemis"
    layer: analysis
    role: filter
    class: runtime.hermes.agents.analysis.Artemis
    enabled: false
    description: "Filtering and focus — noise reduction, relevance prioritization"

  HECATE:
    name: "@Hecate"
    layer: analysis
    role: uncertainty_resolver
    class: runtime.hermes.agents.analysis.Hecate
    enabled: true
    description: "Uncertainty detection — ambiguity, missing info, clarification questions"

  METIS:
    name: "@Metis"
    layer: analysis
    role: optimizer
    class: runtime.hermes.agents.analysis.Metis
    enabled: false
    description: "Tactical optimization — plan improvement, intelligent shortcuts"

  # ── Memory layer (@Agent) ─────────────────────────────────────────
  HESTIA:
    name: "@Hestia"
    layer: memory
    role: session_memory
    class: runtime.hermes.agents.memory.Hestia
    enabled: true
    description: "Session memory — immediate context, user clarifications, run continuity"

  MNEMOSYNE:
    name: "@Mnemosyne"
    layer: memory
    role: knowledge_library
    class: runtime.hermes.agents.memory.Mnemosyne
    enabled: false
    description: "Structured library — internal references, reusable patterns, organizational memory"

  HADES:
    name: "@Hades"
    layer: memory
    role: vector_retrieval
    class: runtime.hermes.agents.memory.Hades
    enabled: true
    description: "Deep memory — semantic retrieval, pgvector chunks, long-term search"

  # ── Output layer (@Agent) ─────────────────────────────────────────
  KAIROS:
    name: "@Kairos"
    layer: output
    role: synthesizer
    class: runtime.hermes.agents.output.Kairos
    enabled: true
    description: "Contextual synthesis — essential selection, information hierarchization"

  DAEDALUS:
    name: "@Daedalus"
    layer: output
    role: builder
    class: runtime.hermes.agents.output.Daedalus
    enabled: true
    description: "Deliverable construction — dossiers, briefs, reports with citations and annexes"

  IRIS:
    name: "@Iris"
    layer: output
    role: communicator
    class: runtime.hermes.agents.output.Iris
    enabled: true
    description: "Communication and tone — context reformulation, recipient adaptation"

  APHRODITE:
    name: "@Aphrodite"
    layer: output
    role: stylist
    class: runtime.hermes.agents.output.Aphrodite
    enabled: false
    description: "Polish and impact — presentation improvement, form enhancement"

  HEPHAESTUS:
    name: "@Hephaestus"
    layer: output
    role: diagram_builder
    class: runtime.hermes.agents.output.Hephaestus
    enabled: false
    description: "Technical production — schemas, Mermaid diagrams, figures"

  # ── System layer (@Agent) ─────────────────────────────────────────
  ARES:
    name: "@Ares"
    layer: system
    role: fast_executor
    class: runtime.hermes.agents.system.Ares
    enabled: false
    description: "Fast execution — simple tasks, degraded mode fallback"

  POSEIDON:
    name: "@Poseidon"
    layer: system
    role: distributor
    class: runtime.hermes.agents.system.Poseidon
    enabled: false
    description: "Load management — parallelism regulation, flow control"
