# config/domains.yaml — Domain-specific overlay configuration
# Domain overlays live in domains/{name}/ and extend base config.
#
# Naming convention:
#   - {name}        → generic / language-neutral domain
#   - {name}_fr     → French-specific domain (uses FR-specific terminology,
#                     references FR norms, content authored in French)

active_domain: architecture_fr

domains:
  general:
    label: "Socle générique (skills agnostiques)"
    skills_overlay: domains/general/skills
    workflows_overlay: null
    policies_overlay: null
    trusted_sources: []

  architecture_fr:
    label: "Architecture & Maîtrise d'Œuvre (FR)"
    skills_overlay: domains/architecture_fr/skills
    workflows_overlay: domains/architecture_fr/workflows
    policies_overlay: domains/architecture_fr/policies
    trusted_sources:
      - DTU
      - CCAG
      - PUCA
      - Legifrance
