flow:
  name: recherche_documentaire
  version: "1.0.0"
  description: >
    Pipeline complet de recherche documentaire multi-agents.
    Couvre la qualification, la collecte, l'analyse, la synthèse et la production.
  criticite_min: C2
  steps:
    - ATHENA               # planification
    - HECATE               # analyse d'incertitude — peut bloquer pour clarifications
    - HERMES               # routage et décomposition en requêtes
    - DEMETER              # collecte (RAG + web)
    - [ARGOS, PROMETHEE]   # extraction + fact-checking en parallèle
    - KAIROS               # synthèse principale
    - METIS                # révision stylistique
    - APOLLON              # validation et score de confiance
    - DEDALE               # assemblage du document final
    - IRIS                 # output utilisateur
  on_hecate_block:
    - IRIS_CLARIFIER       # formule les questions de clarification
  on_apollon_low_score:
    refine_node: KAIROS    # retour en synthèse si score insuffisant
    max_refinements: 2
