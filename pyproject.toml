[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = [
    "E501",   # line too long — géré au cas par cas
    "F401",   # imported but unused — certains imports sont pour side-effects
]
exclude = ["alembic/versions/", "benchmarks/"]

[tool.ruff.lint.per-file-ignores]
# conftest manipulates sys.path before importing modules — required ordering.
"tests/conftest.py" = ["E402"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "session"
asyncio_default_test_loop_scope = "session"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
pythonpath = ["platform/api"]
# importlib mode lets per-agent tests at modules/agents/*/tests/test_agent.py
# coexist without needing __init__.py files (pytest uses unique import paths
# instead of top-level module names).
addopts = "--import-mode=importlib"
