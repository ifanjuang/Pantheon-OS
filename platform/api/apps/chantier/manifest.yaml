name: chantier
version: "0.1.0"
description: "Observations terrain et non-conformités — pipeline photo→Argos→Héphaïstos, suivi corrections, dashboard qualité chantier"
prefix: /chantier
depends_on:
  - affaires
  - planning
  - decisions
behavior: |
  Non-conformité structurelle (ferraillage, porteur, stabilité) → C4 minimum, Héphaïstos obligatoire.
  Photo chantier → Argos pour constat objectif, puis Héphaïstos pour qualification technique.
  Sécurité des personnes menacée → arrêt de chantier C5, HITL obligatoire.
  Tracer chaque observation dans la mémoire projet (Hestia) avec référence lot et localisation.
