name: decisions
version: "0.1.0"
description: "Dashboard mémoire projet — décisions, tâches liées, observations, vues filtrées et KPIs"
prefix: /decisions
depends_on:
  - affaires
  - scoring
behavior: |
  Toute décision C4+ tracée avec niveau de dette D0-D3 et condition de levée explicite.
  Décision irréversible en zone réglementaire (ABF, ERP, zone inondable) → Thémis en co-validation.
  Dette D3 (bloquante) non levée après 30 jours → escalader à Zeus pour arbitrage.
