name: communications
version: "0.1.0"
description: "Registre probatoire — courriers entrants/sortants, suivi délais, pipeline Iris pour rédaction de réponses"
prefix: /communications
depends_on:
  - affaires
  - planning
  - decisions
  - chantier
behavior: |
  Courrier recommandé sans réponse > 15 jours → relance automatique via Iris.
  Mise en demeure détectée → C5 automatique, Thémis en priorité, suspendre toute action unilatérale.
  Courrier sortant engageant (avenant, réserves, litige) → validation Thémis avant envoi.
  Archiver chaque échange dans la mémoire projet avec date et référence affaire.
