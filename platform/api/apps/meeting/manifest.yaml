name: meeting
version: "0.1.0"
description: "Analyse de CR, extraction d'actions, génération d'ordres du jour"
prefix: /meeting
depends_on:
  - affaires
  - documents
  - agent
behavior: |
  Chaque action extraite d'un CR doit avoir responsable + délai + priorité.
  Action sans responsable identifiable → demander clarification avant de clore l'analyse.
  Action C3+ non résolue à l'échéance → relance via Chronos et Iris.
