version: '3.9'

# ── Pantheon OS — V2 Full Stack ──────────────────────────────────────
# Extends the MVP with: Redis · ARQ Workers · MinIO · Portainer
# Usage: docker compose -f docker-compose.yml -f infra/compose/docker-compose.v2.yml up -d

services:

  # ── Redis — ARQ background job broker ────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── ARQ Worker — background job processing ────────────────────────
  worker:
    build:
      context: ../../
      dockerfile: infra/docker/api/Dockerfile
    env_file: ../../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://pantheon:${DB_PASSWORD}@db:5432/pantheon
      DATABASE_URL_SYNC: postgresql://pantheon:${DB_PASSWORD}@db:5432/pantheon
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../../api:/app
      - ../../runtime:/runtime:ro
    command: python worker.py
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── MinIO — S3-compatible file storage ───────────────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-03T14-56-28Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Portainer — Docker management UI ─────────────────────────────
  portainer:
    image: portainer/portainer-ce:2.21.5
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    ports:
      - "9090:9000"
      - "9443:9443"
    restart: unless-stopped

volumes:
  redis_data:
  minio_data:
  portainer_data:
