version: '3.9'

# ── Pantheon OS — MVP Stack ──────────────────────────────────────────
# Services: OpenWebUI · FastAPI · PostgreSQL+pgvector · Ollama
# V2 (Redis, MinIO, ARQ workers): see infra/compose/docker-compose.v2.yml

services:

  # ── PostgreSQL + pgvector ─────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: pantheon
      POSTGRES_USER: pantheon
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./platform/data/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantheon"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── FastAPI — Hermes Runtime API ──────────────────────────────────
  api:
    build:
      context: .
      dockerfile: platform/infra/docker/api/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pantheon:${DB_PASSWORD}@db:5432/pantheon
      DATABASE_URL_SYNC: postgresql://pantheon:${DB_PASSWORD}@db:5432/pantheon
      ASYNCPG_URL: postgresql://pantheon:${DB_PASSWORD}@db:5432/pantheon
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./platform/api:/app
      - ./core:/core:ro
      - ./modules:/modules:ro
      - ./config:/config:ro
      - ./domains:/domains:ro
      - ./modules.yaml:/app/modules.yaml:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --workers 1
    restart: unless-stopped

  # ── OpenWebUI — Chat interface ────────────────────────────────────
  openwebui:
    image: ghcr.io/open-webui/open-webui:v0.5.20
    environment:
      OPENAI_API_BASE_URL: http://api:8000/v1
      OPENAI_API_KEY: ${JWT_SECRET_KEY}
      WEBUI_SECRET_KEY: ${JWT_SECRET_KEY}
      DATABASE_URL: postgresql://pantheon:${DB_PASSWORD}@db:5432/pantheon
      VECTOR_DB: pgvector
      PGVECTOR_DB_URL: postgresql://pantheon:${DB_PASSWORD}@db:5432/pantheon
    volumes:
      - openwebui_data:/app/backend/data
    ports:
      - "3000:8080"
    depends_on:
      - api
      - db
    restart: unless-stopped

  # ── Ollama — Local LLM (optional, disable for OpenAI mode) ────────
  ollama:
    image: ollama/ollama:0.6.5
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # GPU NVIDIA — uncomment if available:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── Adminer — DB UI (dev profile only) ───────────────────────────
  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db
    profiles: [dev]

volumes:
  postgres_data:
  openwebui_data:
  ollama_data:
