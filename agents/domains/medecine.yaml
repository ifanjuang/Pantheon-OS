name: "Médecine & Santé"
label: "Médecine"
description: "Établissements de santé, cabinets médicaux, industrie pharmaceutique, dispositifs médicaux."

context_injection: |
  ## Domaine : Médecine & Santé
  Tu travailles pour un établissement de santé, un cabinet médical, ou une organisation de santé.
  Missions : prise en charge patients, gestion de parcours de soins, compliance réglementaire, gestion de projets médicaux, évaluation de dispositifs médicaux.
  Acteurs : patients, médecins, infirmiers, pharmaciens, directions d'établissement, ARS, HAS, ANSM, assurance maladie, industriels pharma/DM.
  Réglementation : Code de la santé publique, règlement MDR (dispositifs médicaux), bonnes pratiques cliniques (BPC), RGPD (données de santé), Loi informatique et libertés.
  Documents clés : dossiers patients, protocoles de soins, ordonnances, rapports d'inspection, certifications HAS, AMM (autorisation de mise sur le marché), études cliniques.
  Impératifs absolus : sécurité patient (primum non nocere), secret médical, traçabilité des actes, signalement des effets indésirables.
  Adapte toutes tes analyses à ce contexte médical/santé. La sécurité du patient prime sur tout autre considération.

trusted_sources:
  - has-sante.fr
  - ansm.sante.fr
  - legifrance.gouv.fr
  - who.int/fr
  - pubmed.ncbi.nlm.nih.gov
  - eur-lex.europa.eu
  - ameli.fr

criticality_keywords:
  c5:
    - "risque vital immédiat"
    - "sécurité patient compromise"
    - "erreur médicale grave"
    - "effet indésirable grave"
    - "rupture de soins critique"
    - "non-conformité réglementaire critique"
  c4:
    - "décision thérapeutique engageante"
    - "acte irréversible"
    - "modification de protocole"
    - "signalement obligatoire"
    - "retrait de produit"

veto_patterns:
  themis:
    - ["\\bsecret\\s+m[eé]dical\\s+(viol[eé]|compromis)\\b", "Suspension immédiate — informer le DPO et le médecin responsable"]
    - ["\\bconsentement\\s+(absent|non\\s+obtenu|insuffisant)\\b", "Acte impossible sans consentement éclairé — obtenir impérativement avant toute action"]
    - ["\\bnon[- ]conforme\\s+(au[x]?\\s+)?(BPC|bonnes\\s+pratiques\\s+cliniques|règlement\\s+MDR)\\b", "Correction obligatoire — contacter le responsable qualité"]
    - ["\\bresponsabilit[eé]\\s+m[eé]dicale\\s+engag[eé]e\\b", "Informer immédiatement la direction et le service juridique"]
  hephaistos:
    - ["\\bcontre[- ]indiqu[eé]\\b", "Acte interdit — proposer une alternative thérapeutique sûre"]
    - ["\\brisque\\s+vital\\s+(immédiat|confirmé|avéré)\\b", "Mesures conservatoires immédiates — alerter le médecin de garde"]
    - ["\\beffet\\s+ind[eé]sirable\\s+(grave|inattendu)\\b", "Signalement ANSM obligatoire sous 15 jours — stopper l'acte"]
  apollon:
    - ["\\bcontradiction\\s+(avec\\s+les\\s+recommandations|clinique)\\s+(confirm[eé]e|établie)\\b", "Arbitrage par le médecin référent ou comité d'éthique"]
