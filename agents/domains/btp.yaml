name: "Architecture & Maîtrise d'Œuvre"
label: "MOE/BTP"
description: "Agences d'architecture et de maîtrise d'œuvre — construction, réhabilitation, ERP."

context_injection: |
  ## Domaine : Architecture & Maîtrise d'Œuvre (MOE/BTP)
  Tu travailles pour une agence de maîtrise d'œuvre (MOE).
  Projets : construction neuve, réhabilitation, ERP, logements, bureaux, équipements publics.
  Acteurs : MOA (maître d'ouvrage), MOE (maître d'œuvre), entreprises BTP, BET, bureau de contrôle, OPC, coordinateur SPS.
  Réglementation : Code de la construction et de l'habitation, DTU, Eurocodes, RE2020, PCM, Code des marchés publics.
  Documents clés : PC (permis de construire), DCE (dossier consultation entreprises), DOE (dossier des ouvrages exécutés), CCTP, CCAP, BPU, DGD, PV de réception, rapport BC.
  Phases MOE : ESQ → APS → APD → PRO → DCE → ACT → VISA → DET → AOR.

trusted_sources:
  - legifrance.gouv.fr
  - cstb.fr
  - rt-batiment.fr
  - afnor.org
  - oppbtp.fr
  - qualibat.fr
  - cohesion-territoires.gouv.fr
  - construction.gouv.fr
  - service-public.fr
  - boamp.fr

criticality_keywords:
  c5:
    - "risque structurel"
    - "sécurité des personnes"
    - "péril imminent"
    - "mise en demeure"
    - "arrêté de chantier"
    - "contentieux"
    - "responsabilité décennale"
    - "sinistre"
  c4:
    - "engagement financier"
    - "signature marché"
    - "avenant"
    - "modification marché"
    - "décision engageante"
    - "réception des travaux"

veto_patterns:
  themis:
    - ["\\bhors\\s+(de\\s+la\\s+)?mission\\s+(MOE|architecte|maître\\s+d'œuvre)?\\b", "Vérifier le périmètre contractuel, éventuellement établir un avenant"]
    - ["\\bresponsabilit[eé]\\s+(de\\s+la\\s+)?MOE\\s+(est\\s+)?engag[eé]e\\b", "Valider avec le client/assureur avant toute action"]
    - ["\\bnon\\s+couvert[e]?\\s+(par\\s+)?(le\\s+)?contrat\\b", "Établir un avenant ou rediriger vers le maître d'ouvrage"]
    - ["\\blitige\\s+(potentiel|imminent|en\\s+cours|probable)\\b", "Saisir le service juridique, suspendre toute action unilatérale"]
    - ["\\bmise\\s+en\\s+demeure\\b", "Transmettre au juriste, répondre dans les délais légaux"]
    - ["\\bcontentieux\\s+(juridique|contractuel|probable|imminent)\\b", "Consulter le service juridique avant toute décision"]
  hephaistos:
    - ["\\bnon[- ]conforme\\s+(au[x]?\\s+)?DTU\\b", "Obtenir un avis technique ou une dérogation auprès du bureau de contrôle"]
    - ["\\binterdit\\s+(par\\s+)?(le\\s+)?(DTU|RE2020|ERP|règl[e]?ment)\\b", "Consulter un BE spécialisé pour solution alternative conforme"]
    - ["\\bdanger\\s+(structurel|de\\s+stabilité|pour\\s+la\\s+structure)\\b", "Suspendre les travaux, mandater un bureau de contrôle structure"]
    - ["\\bs[eé]curit[eé]\\s+(des\\s+personnes\\s+)?(en\\s+)?(danger|menac[eé]e|compromise)\\b", "Mesures conservatoires immédiates, déclaration à l'inspection du travail"]
  apollon:
    - ["\\bcontradiction\\s+(normative|r[eè]glementaire)\\s+(confirm[eé]e|av[eé]r[eé]e|établie)\\b", "Arbitrage normatif par le CSTB ou bureau de contrôle"]
    - ["\\bincoh[eé]rence\\s+(majeure\\s+)?(r[eè]glementaire|normative)\\s+(confirm[eé]e|établie)\\b", "Demander une interprétation officielle à l'organisme normalisateur"]
