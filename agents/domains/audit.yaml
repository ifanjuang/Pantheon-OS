name: "Audit & Expertise comptable"
label: "Audit/Finance"
description: "Cabinets d'audit, expertise comptable, commissariat aux comptes, conseil financier."

context_injection: |
  ## Domaine : Audit & Expertise comptable
  Tu travailles pour un cabinet d'audit, d'expertise comptable ou de commissariat aux comptes.
  Missions : audit légal, commissariat aux comptes, conseil fiscal, due diligence financière, restructuration, évaluation d'entreprise.
  Acteurs : clients (dirigeants, DAF), associés, managers, auditeurs, autorités fiscales (DGFiP), AMF, H3C, commissaires aux comptes adverses.
  Réglementation : Code de commerce, Plan comptable général (PCG), normes IFRS/GAAP, normes ISA/NEP, Code général des impôts, réglementation AMF.
  Documents clés : comptes annuels, rapports d'audit, liasses fiscales, pactes d'actionnaires, rapports de gestion, lettres d'affirmation, rapports de commissaire aux comptes.
  Impératifs : indépendance professionnelle, secret professionnel, normes d'exercice — tout compromis est une faute déontologique majeure.
  Adapte toutes tes analyses à ce contexte financier/comptable. Remplace les références BTP par des références comptables et réglementaires financières.

trusted_sources:
  - legifrance.gouv.fr
  - bofip.impots.gouv.fr
  - amf-france.org
  - h3c.fr
  - cncc.fr
  - ifrs.org
  - eur-lex.europa.eu

criticality_keywords:
  c5:
    - "requalification fiscale"
    - "délit de présentation de faux bilan"
    - "fraude fiscale"
    - "blanchiment"
    - "insolvabilité imminente"
    - "défaillance de l'entité"
    - "continuité d'exploitation remise en cause"
  c4:
    - "certification avec réserve"
    - "refus de certification"
    - "irrégularité comptable significative"
    - "engagement hors bilan majeur"
    - "litige fiscal en cours"

veto_patterns:
  themis:
    - ["\\bindépendance\\s+(compromise|menac[eé]e|violée)\\b", "Se déporter immédiatement — alerter l'associé responsable et le H3C"]
    - ["\\bconflit\\s+d['']int[eé]r[eê]ts?\\b", "Se déporter du dossier, documenter formellement"]
    - ["\\bfraude\\s+(fiscale|comptable|confirmée|avérée)\\b", "Obligation légale de signalement — consulter immédiatement le Procureur"]
    - ["\\bblanchiment\\s+(de\\s+capitaux|d'argent)\\b", "Déclarer à Tracfin immédiatement — obligation légale"]
    - ["\\bfaux\\s+(en\\s+écritures?|bilan|documents?)\\b", "Refuser toute certification, consulter le service juridique du cabinet"]
  hephaistos:
    - ["\\bnon[- ]conforme\\s+(aux\\s+)?(IFRS|PCG|normes\\s+ISA|NEP)\\b", "Emettre une réserve formelle ou refuser la certification"]
    - ["\\birrégularit[eé]\\s+(significative|majeure)\\s+(dans\\s+les\\s+comptes)\\b", "Documenter, notifier les dirigeants, réévaluer la certification"]
    - ["\\bcontinuit[eé]\\s+d'exploitation\\s+(remise\\s+en\\s+cause|incertaine|compromise)\\b", "Mention obligatoire dans le rapport — alerter l'assemblée générale"]
  apollon:
    - ["\\bcontradiction\\s+(avec\\s+les\\s+normes|comptable)\\s+(confirm[eé]e|établie)\\b", "Arbitrage par la chambre nationale des commissaires aux comptes"]
