name: "Cabinet juridique"
label: "Droit"
description: "Cabinets d'avocats, notaires, juristes d'entreprise — contentieux, conseil, transactions."

context_injection: |
  ## Domaine : Cabinet juridique
  Tu travailles pour un cabinet d'avocats, un notaire ou un service juridique.
  Missions : conseil juridique, contentieux, rédaction d'actes, due diligence, négociation, compliance.
  Acteurs : clients, adversaires, juges, greffiers, huissiers, experts judiciaires, notaires, avocats adverses.
  Réglementation : Code civil, Code de commerce, Code du travail, Code pénal, Code de procédure civile, jurisprudence.
  Documents clés : assignations, conclusions, actes notariés, contrats, baux, statuts, PV d'AG, ordonnances, jugements.
  Impératifs absolus : délais de prescription, forclusion, délais de procédure — tout dépassement est irréversible.
  Adapte toutes tes analyses à ce contexte juridique. Les références BTP dans tes instructions de base sont à transposer en références juridiques.

trusted_sources:
  - legifrance.gouv.fr
  - doctrine.fr
  - courdecassation.fr
  - conseil-etat.fr
  - service-public.fr
  - eur-lex.europa.eu
  - dalloz.fr

criticality_keywords:
  c5:
    - "prescription imminente"
    - "forclusion"
    - "nullité absolue"
    - "détention provisoire"
    - "liquidation judiciaire"
    - "interdiction de gérer"
    - "saisie conservatoire urgente"
  c4:
    - "signature d'acte"
    - "transaction définitive"
    - "engagement irrévocable"
    - "délai d'appel"
    - "accord de principe"

veto_patterns:
  themis:
    - ["\\bprescription\\s+(acquise|expir[eé]e|atteinte)\\b", "Vérifier immédiatement les délais — action irrecevable si prescription acquise"]
    - ["\\bforclusion\\b", "Délai impérativement dépassé — consulter voix de recours extraordinaires"]
    - ["\\bnullit[eé]\\s+(de\\s+la\\s+proc[eé]dure|absolue|d'ordre\\s+public)\\b", "Corriger le vice de procédure avant tout acte ultérieur"]
    - ["\\bincompatibilit[eé]\\s+(de\\s+fonctions|d'int[eé]r[eê]ts|conflit\\s+d'int[eé]r[eê]ts)\\b", "Se dessaisir immédiatement, informer le bâtonnier"]
    - ["\\birrecevabilit[eé]\\b", "Régulariser la procédure ou former un recours immédiatement"]
    - ["\\bconflit\\s+d['']int[eé]r[eê]ts?\\b", "Se déporter du dossier, informer le client et le bâtonnier"]
  hephaistos:
    - ["\\bjurisprudence\\s+(contraire|défavorable)\\s+(constante|établie|ferme)\\b", "Documenter la position contraire et conseiller le client sur les risques réels"]
    - ["\\binconstitutionnel\\b", "Soulever la QPC ou consulter le Conseil constitutionnel"]
    - ["\\billégal\\s+(au\\s+regard\\s+de|selon\\s+l'article)\\b", "Renoncer à l'acte ou obtenir une dérogation légale formelle"]
  apollon:
    - ["\\bcontradiction\\s+(avec\\s+la\\s+jurisprudence|normative)\\s+(confirm[eé]e|établie)\\b", "Arbitrage par juriste spécialisé ou doctrine autorisée"]
    - ["\\brevirement\\s+r[eé]cent\\s+de\\s+jurisprudence\\b", "Mettre à jour l'analyse — ancien raisonnement potentiellement caduc"]
